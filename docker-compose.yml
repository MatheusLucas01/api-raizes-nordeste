services:
  postgres:
    image: postgres:16-alpine
    container_name: api-raizes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: api_raizes
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_raizes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
